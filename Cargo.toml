[workspace]
default-members = [ "examples/some-lib-forms" ]
members = [
  "crates/gpui-form",
  "crates/gpui-form-component",
  "crates/gpui-form-core",
  "crates/gpui-form-derive",
  "crates/gpui-form-internal-macros",
  "crates/gpui-form-prototyping-core",
  "examples/some-lib",
  "examples/some-lib-forms",
  "examples/prototyping",
]
resolver = "3"

[workspace.package]
edition = "2024"
license = "MIT OR Apache-2.0"
publish = true
readme = "README.md"
repository = "https://github.com/stayhydated/gpui-form"
rust-version = "1.88"
version = "0.5.1"

[workspace.dependencies]
anyhow = "1.0.100"
automod = "1.0.15"
bon = "3.8.2"
chrono = "0.4.42"
crabtime = "1.1.4"
crate-paths = "0.2.0"
darling = "0.23.0"
derive_more = "2.1.1"
dotenv = "0.15.0"
es-fluent = "0.5.3"
es-fluent-lang = "0.5.3"
es-fluent-manager-embedded = "0.5.3"
fluent-bundle = "0.16.0"
futures = "0.3.31"
getset = "0.1.6"
gpui = { git = "https://github.com/zed-industries/zed" }
gpui-component = { git = "https://github.com/longbridge/gpui-component" }
gpui-form = { path = "crates/gpui-form", version = "0.5.1" }
gpui-form-component = { path = "crates/gpui-form-component", version = "0.5.1" }
gpui-form-core = { path = "crates/gpui-form-core", version = "0.5.1" }
gpui-form-derive = { path = "crates/gpui-form-derive", version = "0.5.1" }
gpui-form-internal-macros = { path = "crates/gpui-form-internal-macros", version = "0.5.1" }
gpui-form-internal-paths = { path = "crates/gpui-form-internal-paths", version = "0.5.0" }
gpui-form-prototyping-core = { path = "crates/gpui-form-prototyping-core", version = "0.5.1" }
gpui-storybook = { branch = "git", git = "https://github.com/stayhydated/gpui-storybook" }
heck = "0.5.0"
insta = { version = "1.46.0" }
inventory = "0.3.21"
itertools = "0.14.0"
koruma = { branch = "derive-core", git = "https://github.com/stayhydated/koruma" }
koruma-collection = { branch = "derive-core", git = "https://github.com/stayhydated/koruma" }
koruma-derive-core = { branch = "derive-core", git = "https://github.com/stayhydated/koruma" }
log = "0.4.29"
nutype = "0.6.2"
once_cell = "1.21.3"
paste = "1.0.15"
prettyplease = "0.2.37"
proc-macro-error2 = "2.0"
proc-macro2 = "1.0.105"
quote = "1.0.43"
rayon = "1.11.0"
regex = "1.12.2"
rust-embed = "8.9.0"
rust_decimal = "1.39.0"
serde = "1.0.228"
serde_json = "1.0.149"
strum = "0.27.2"
syn = "2.0.114"
thiserror = "2.0.17"
tokio = "1.49.0"
tracing-subscriber = "0.3.22"
unic-langid = "0.9.6"
unicode-segmentation = "1.12.0"

[workspace.lints.rust]
unexpected_cfgs = { level = "deny" }

[workspace.lints.clippy]
dbg_macro = "deny"
todo = "deny"
type_complexity = "allow"
uninlined_format_args = "allow"
unused_trait_names = "warn"

[profile.dev]
codegen-units = 16
debug = "limited"
opt-level = 1
split-debuginfo = "unpacked"

[profile.dev.package."*"]
opt-level = 3

[profile.release]
codegen-units = 1
lto = true
opt-level = 3
